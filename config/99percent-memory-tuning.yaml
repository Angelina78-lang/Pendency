model:
  base_model: meta-llama/Llama-3.2-8B-Instruct  # Higher capacity
  
peft:
  r: 64                    # Higher rank = higher capacity
  lora_alpha: 128          # Stronger adaptation
  target_modules: ["q_proj", "k_proj", "v_proj", "o_proj"]  # All attention
  
memory_tuning:              # Lamini Memory Tuning [web:125]
  num_adapters: 1000000     # 1M institution-specific memories
  cross_attention: true
  
quantization:
  load_in_4bit: true
  bnb_4bit_compute_dtype: bfloat16
  bnb_4bit_use_double_quant: true
  
training:
  per_device_train_batch_size: 4
  gradient_accumulation_steps: 32      # Effective batch 128
  learning_rate: 1e-4
  lr_scheduler_type: cosine
  warmup_steps: 500
  num_train_epochs: 10                 # Extended for 99.9%
  
advanced:
  gradient_checkpointing: true
  optim: adamw_torch
  max_grad_norm: 0.3
  seed: 42
